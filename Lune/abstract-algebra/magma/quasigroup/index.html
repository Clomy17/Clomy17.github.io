	<body>
		<h1>準群</h1>
		<section>
			<h2>定義</h2>
			<article id="準群" class="ax">
				<h3>準群</h3>
				<p><dfn class="ax">準群</dfn>(quasi group)とは，以下の2つのデータからなる．</p>
				<ul>
					<li>集合<math><mi>𝐺</mi></math></li>
					<li>積と呼ばれる<math><mi>𝐺</mi></math>の2項演算
						<math>
							<mo>⋅</mo>
							<mo>:</mo>
							<mrow>
								<mrow>
									<mi>𝐺</mi>
									<mo>×</mo>
									<mi>𝐺</mi>
								</mrow>
								<mo>→</mo>
								<mi>𝐺</mi>
							</mrow>
						</math>
					</li>
				</ul>
				<p>これらは以下の条件を満たす．</p>
				<ul>
					<li>
						左・右除法の一意性
					</li>
				</ul>
			</article>
			<article id="準同型" class="dfn">
				<h3>準同型</h3>
				<p>
					<math>
						<mi>𝐺</mi>
						<mo>,</mo>
						<msup>
							<mi>𝐺</mi>
							<mo>′</mo>
						</msup>
					</math>
					を<a href="#準群">準群</a>とする．写像
					<math>
						<mi>𝑓</mi>
						<mo>:</mo>
						<mrow>
							<mi>𝐺</mi>
							<mo>→</mo>
							<msup>
								<mi>𝐺</mi>
								<mo>′</mo>
							</msup>
						</mrow>
					</math>
					が以下を満たすとき，<dfn>（準群）準同型</dfn>と呼ぶ．
				</p>
				<p>
					<math display="block">
						<mrow>
							<mo>∀</mo>
							<mo>&af;</mo>
							<mrow>
								<mrow>
									<mi>𝑔</mi>
									<mo>,</mo>
									<mi>ℎ</mi>
								</mrow>
								<mo>∈</mo>
								<mi>𝐺</mi>
							</mrow>
						</mrow>
						<mo>,</mo>
						<mrow>
							<mrow>
								<mi>𝑓</mi>
								<mo>&af;</mo>
								<mrow>
									<mo>(</mo>
									<mrow>
										<mi>𝑔</mi>
										<mo>&it;</mo>
										<mi>ℎ</mi>
									</mrow>
									<mo>)</mo>
								</mrow>
							</mrow>
							<mo>=</mo>
							<mrow>
								<mrow>
									<mi>𝑓</mi>
									<mo>&af;</mo>
									<mrow>
										<mo>(</mo>
										<mi>𝑔</mi>
										<mo>)</mo>
									</mrow>
								</mrow>
								<mo>&it;</mo>
								<mrow>
									<mi>𝑓</mi>
									<mo>&af;</mo>
									<mrow>
										<mo>(</mo>
										<mi>ℎ</mi>
										<mo>)</mo>
									</mrow>
								</mrow>
							</mrow>
						</mrow>
					</math>
				</p>
			</article>
			<article id="同型" class="dfn">
				<h3>同型</h3>
				<p>
					全単射な<a href="#準同型">準同型</a>を<dfn>同型</dfn>と呼ぶ．
				</p>
			</article>
			<article id="準群の圏" class="dfn">
				<h3>準群の圏</h3>
				<p><a href="../../../category/index.html#対象">対象</a>を全ての<a href="#準群">準群</a>，<a href="../../../category/index.html#射">射</a>を全ての<a href="#準同型">準圏型</a>とする<a href="../../../category/index.html#圏">圏</a>を<dfn>準群の圏</dfn>と呼ぶ．</p>
			</article>
			
			
		</section>
	</body>
</html>
