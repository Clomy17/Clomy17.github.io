		<h1>多元環・代数</h1>
		<p>多元環も代数学も英語でalgebraだが，可換環上の多元環，体上の代数と使い分けてみる．</p>
		<section>
			<h2>定義</h2>
			<article id="多元環" class="ax">
				<h3 class="ax-t">多元環</h3>
				<p class="ax-d"><math><mi>𝑅</mi></math>を可換環とする．環<math><mi>𝑅</mi></math>上の<dfn class="ax">多元環</dfn>（または<dfn class="ax">代数</dfn>）(algebra)とは，以下のデータからなる．</p>
				<ul>
					<li><a href="../module/over-ring/index.html#左R加群"><math><mi>𝑅</mi></math>-加群</a><math><mi>𝐴</mi></math></li>
					<li><math><mi>𝐴</mi></math>上の二項演算
						<math>
							<mo>⋅</mo>
							<mo>:</mo>
							<mrow>
								<mrow>
									<mi>𝐴</mi>
									<mo>×</mo>
									<mi>𝐴</mi>
								</mrow>
								<mo>→</mo>
								<mi>𝐴</mi>
							</mrow>
						</math>
					</li>
				</ul>
				<p>これらは以下の条件を満たす．</p>
				<ul>
					<li><math><mo>⋅</mo></math>は<math><mi>𝑅</mi></math>-双線型．つまり，</li>
				</ul>
			</article>
		</section>
